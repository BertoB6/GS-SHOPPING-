<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS SHOPPING</title>

<style>

/* BASE */
body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#2c0066,#3a0070,#120030);
color:white;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ffd700;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00ff88;
}

/* CONTAINER */
.container{
margin-top:100px;
padding:40px 20px;
text-align:center;
}

/* BOTÕES */
.cta button{
padding:16px 35px;
font-size:18px;
font-weight:bold;
margin:10px;
border:none;
border-radius:30px;
cursor:pointer;
}

.contas{background:#ffd700;color:black;}
.diamantes{background:#00ff88;color:black;}

/* MENSAGEM */
.mensagem{
opacity:0.8;
margin-top:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

/* CARDS */
.produtos{display:none;margin-top:30px;}

.contas-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

.preco{color:#00ff88;font-weight:bold;}

.btn{
background:#00ff88;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* TABELA */
table{
width:100%;
max-width:700px;
margin:auto;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #444;
}

/* FLOATING */

.floating-box{
position:fixed;
bottom:20px;
right:20px;
background:rgba(0,0,0,0.7);
padding:12px 18px;
border-radius:12px;
display:flex;
gap:10px;
z-index:9999;
}

.floating-box a{
color:#00ff88;
text-decoration:none;
font-weight:bold;
}

.close-btn{
background:none;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">🎮 GS SHOPPING</div>
<nav>
<a href="index.html">Início</a>
<a href="loja.html">Loja</a>
</nav>
</header>

<div class="container">

<div class="cta">
<button class="contas" onclick="mostrarContas()">Contas</button>
<button class="diamantes" onclick="mostrarDiamantes()">Diamantes</button>
</div>

<div id="mensagem" class="mensagem">
Escolhe um produto 👆
</div>

<!-- CONTAS -->
<div id="contas" class="produtos">
<div class="contas-grid">

<div class="card">
<img src="conta2.jpg">
<h3>Conta Rara</h3>
<p class="preco">519 MT</p>
<button class="btn" onclick="comprar('Conta Rara 519MT')">Comprar</button>
</div>

<div class="card">
<img src="conta3.jpg">
<h3>Conta Mestre</h3>
<p class="preco">719 MT</p>
<button class="btn" onclick="comprar('Conta Mestre 719MT')">Comprar</button>
</div>

<div class="card">
<img src="conta4.jpg">
<h3>Conta Elite</h3>
<p class="preco">999 MT</p>
<button class="btn" onclick="comprar('Conta Elite 999MT')">Comprar</button>
</div>

<div class="card">
<img src="conta5.jpg">
<h3>Conta Iniciante</h3>
<p class="preco">169 MT</p>
<button class="btn" onclick="comprar('Conta Iniciante 169MT')">Comprar</button>
</div>

</div>
</div>

<!-- DIAMANTES -->
<div id="diamantes" class="produtos">

<table>
<tr><th>Preço</th><th>Diamantes</th><th></th></tr>

<tr><td>75</td><td>110</td>
<td><button class="btn" onclick="comprar('110 diamantes 75MT')">Comprar</button></td></tr>

<tr><td>145</td><td>231</td>
<td><button class="btn" onclick="comprar('231 diamantes 145MT')">Comprar</button></td></tr>

<tr><td>275</td><td>583</td>
<td><button class="btn" onclick="comprar('583 diamantes 275MT')">Comprar</button></td></tr>

</table>

</div>

</div>

<!-- FLOATING -->
<div id="floatingBox" class="floating-box">
<a href="https://bertomain.vercel.app/projetos.html" target="_blank">
Criar meu site
</a>
<button class="close-btn" onclick="fecharBox()">✖</button>
</div>

<script>

const numero="258840667205";

function comprar(p){
let msg=encodeURIComponent("Quero "+p);
window.open("https://wa.me/"+numero+"?text="+msg);
}

function mostrarContas(){
document.getElementById("mensagem").style.display="none";
document.getElementById("contas").style.display="block";
document.getElementById("diamantes").style.display="none";
}

function mostrarDiamantes(){
document.getElementById("mensagem").style.display="none";
document.getElementById("diamantes").style.display="block";
document.getElementById("contas").style.display="none";
}

function fecharBox(){
document.getElementById("floatingBox").style.display="none";
}

</script>

</body>
</html>
